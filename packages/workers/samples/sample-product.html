<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>바로쇼핑 — 노이즈캔슬링 무선 이어버드 Pro</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, "Apple SD Gothic Neo", system-ui, sans-serif; color: #1a1714; background: #fbf7f0; }
      .wrap { max-width: 720px; margin: 0 auto; padding: 24px; }
      .breadcrumb { font-size: 13px; color: #8c8377; margin-bottom: 16px; }
      .hero { background: #e9f0ff; border-radius: 28px; height: 360px; display: flex; align-items: center; justify-content: center; font-size: 160px; }
      .category { display: inline-block; margin: 20px 0 8px; font-size: 14px; font-weight: 700; color: #fff; background: #2e5bff; padding: 6px 14px; border-radius: 999px; }
      .product-name { font-size: 30px; font-weight: 900; margin: 6px 0; line-height: 1.25; }
      .spec { font-size: 16px; color: #5a5650; margin: 8px 0 16px; }
      .rating-row { font-size: 16px; margin-bottom: 20px; }
      .rating { font-weight: 800; color: #1a1714; }
      .reviews { color: #8c8377; }
      .price-box { border-top: 1px solid #e3dccd; padding-top: 20px; }
      .price-was { font-size: 18px; color: #8c8377; text-decoration: line-through; }
      .discount { color: #ff4d2e; font-weight: 900; font-size: 26px; margin-left: 8px; }
      .price-now { font-size: 40px; font-weight: 900; color: #1a1714; margin-top: 4px; }
      .buy { margin-top: 24px; background: #ff4d2e; color: #fff; border: 0; width: 100%; padding: 18px; font-size: 18px; font-weight: 800; border-radius: 14px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="breadcrumb">홈 &gt; 오디오 &gt; 이어폰</div>
      <div class="hero">🎧</div>

      <span class="category">오디오 · 이어폰</span>
      <h1 class="product-name">노이즈캔슬링 무선 이어버드 Pro</h1>
      <p class="spec">최대 36시간 재생 · IPX5 생활방수 · 멀티포인트 연결</p>

      <div class="rating-row">
        <span class="rating">4.9</span>
        <span class="reviews">12,840</span> 리뷰
      </div>

      <div class="price-box">
        <span class="price-was">159,000원</span>
        <span class="discount">50%</span>
        <div class="price-now">79,000원</div>
      </div>

      <button class="buy">바로 구매</button>
    </div>
  </body>
</html>
